<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGO DIARY - SHANTO.AHMED</title>
    <!-- Google Fonts & PDF Library -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary-color: #00b894; /* আপনার লোগোর সাথে মিল রেখে সবুজ রঙ */
            --bg-color: #808080;
            --card-bg: #d3d3d3;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 500px;
            background: var(--card-bg);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Lock Screen */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
        }

        .logo-main {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Header */
        header {
            background: var(--primary-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 25px 25px;
        }

        .header-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            margin-bottom: 10px;
        }

        .entry-card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary-color);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
        }

        .fab {
            position: fixed;
            bottom: 25px; right: 25px;
            background: var(--primary-color);
            color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer; border: none;
        }

        #entry-form {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 500;
            padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        .input-field {
            width: 100%; padding: 12px;
            margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #ddd; box-sizing: border-box;
        }

        .search-bar {
            width: 90%; padding: 12px;
            margin: -20px auto 10px; display: block;
            border-radius: 25px; border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }
    </style>
</head>
<body>

<!-- লক স্ক্রিন -->
<div id="lock-screen">
    <img src="logo.png" class="logo-main" alt="RGO Diary Logo">
    <h2 style="color: #333; margin-bottom: 5px;">RGO DIARY</h2>
    <p style="color: #666; margin-bottom: 20px;">By SHANTO.AHMED</p>
    <input type="password" id="pass-input" class="input-field" style="width: 200px; text-align: center;" placeholder="পাসওয়ার্ড লিখুন">
    <button class="btn" onclick="checkPassword()">খুলুন</button>
</div>

<div class="app-container">
    <header>
        <img src="logo.png" class="header-logo">
        <h1 style="margin: 0; font-size: 24px;">RGO DIARY</h1>
        <p style="margin: 0; font-size: 14px; opacity: 0.9;">স্মৃতি থাকুক নিরাপদে</p>
    </header>

    <input type="text" class="search-bar" id="search" placeholder="স্মৃতি খুঁজুন..." onkeyup="renderEntries()">

    <div id="entry-list"></div>

    <!-- ফর্ম -->
    <div id="entry-form">
        <h2 style="color: var(--primary-color);">নতুন স্মৃতি লিখুন</h2>
        <input type="text" id="note-title" class="input-field" placeholder="শিরোনাম (Title)">
        <textarea id="note-text" class="input-field" style="height: 200px;" placeholder="আপনার মনের কথা..."></textarea>
        <input type="file" id="image-input" accept="image/*" style="margin-bottom: 20px;">
        
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="flex: 1;" onclick="saveEntry()">সংরক্ষণ</button>
            <button class="btn" style="flex: 1; background: #ff7675;" onclick="toggleForm()">বাতিল</button>
        </div>
    </div>

    <button class="fab" onclick="toggleForm()">+</button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('rgoDiaryData')) || [];
    const password = "789875"; // আপনার পাসওয়ার্ড

    function checkPassword() {
        if(document.getElementById('pass-input').value === password) {
            document.getElementById('lock-screen').style.display = 'none';
        } else {
            alert("ভুল পাসওয়ার্ড!");
        }
    }

    function toggleForm() {
        const form = document.getElementById('entry-form');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function saveEntry() {
        const title = document.getElementById('note-title').value;
        const text = document.getElementById('note-text').value;
        const file = document.getElementById('image-input').files[0];

        if(!title || !text) return alert("দয়া করে শিরোনাম ও বর্ণনা লিখুন");

        const reader = new FileReader();
        reader.onload = function(e) {
            const entry = {
                id: Date.now(),
                title: title,
                content: text,
                image: file ? e.target.result : null,
                date: new Date().toLocaleString('bn-BD')
            };
            entries.unshift(entry);
            localStorage.setItem('rgoDiaryData', JSON.stringify(entries));
            renderEntries();
            toggleForm();
            document.getElementById('note-title').value = '';
            document.getElementById('note-text').value = '';
        };

        if(file) reader.readAsDataURL(file);
        else reader.onload();
    }

    function renderEntries() {
        const list = document.getElementById('entry-list');
        const search = document.getElementById('search').value.toLowerCase();
        list.innerHTML = '';

        entries.filter(e => e.title.toLowerCase().includes(search)).forEach(entry => {
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.innerHTML = `
                <div style="font-weight: bold; font-size: 18px; color: var(--primary-color);">${entry.title}</div>
                <div style="font-size: 12px; color: #888; margin-bottom: 10px;">📅 ${entry.date}</div>
                <div style="white-space: pre-wrap; margin-bottom: 10px;">${entry.content}</div>
                ${entry.image ? `<img src="${entry.image}" style="width:100%; border-radius:10px;">` : ''}
                <div style="margin-top: 10px;">
                    <button onclick="deleteEntry(${entry.id})" style="background: none; border: none; color: #ff7675; cursor: pointer;">মুছে ফেলুন</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function deleteEntry(id) {
        if(confirm("মুছে ফেলতে চান?")) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('rgoDiaryData', JSON.stringify(entries));
            renderEntries();
        }
    }

    renderEntries();
</script>

</body>
</html>
